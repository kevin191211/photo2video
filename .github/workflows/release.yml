name: Release

# 推送 v 開頭的 tag（例如 v0.2.0）時自動建置並發佈到 GitHub Releases
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rust 建置快取
        uses: Swatinem/rust-cache@v2

      - name: 建置 release 版
        run: cargo build --release

      - name: 打包（含 FFmpeg 與使用說明）
        shell: pwsh
        run: |
          New-Item -ItemType Directory package | Out-Null
          Copy-Item target/release/photo2video.exe package/
          Copy-Item 使用說明.md package/
          # 附上 FFmpeg，讓使用者解壓即用、不需第一次啟動時再下載
          # 多來源＋重試：避免單一下載站暫時故障（例如 503）導致發版失敗
          $urls = @(
            "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip",
            "https://github.com/BtbN/FFmpeg-Builds/releases/latest/download/ffmpeg-master-latest-win64-gpl.zip"
          )
          $ok = $false
          foreach ($u in $urls) {
            for ($i = 1; $i -le 2; $i++) {
              try {
                Invoke-WebRequest -Uri $u -OutFile ffmpeg.zip -TimeoutSec 300
                $ok = $true; break
              } catch {
                Write-Host "下載失敗（$u，第 $i 次）：$($_.Exception.Message)"
                Start-Sleep -Seconds 20
              }
            }
            if ($ok) { break }
          }
          if (-not $ok) { throw "所有 FFmpeg 下載來源都失敗" }
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg_tmp
          $exe = Get-ChildItem ffmpeg_tmp -Recurse -Filter ffmpeg.exe | Select-Object -First 1
          Copy-Item $exe.FullName package/
          Compress-Archive -Path package/* -DestinationPath "photo2video-${{ github.ref_name }}-windows-x64.zip"
          # 另附固定檔名的複本，讓 releases/latest/download/photo2video-windows-x64.zip 永遠指向最新版
          Copy-Item "photo2video-${{ github.ref_name }}-windows-x64.zip" photo2video-windows-x64.zip
          # 單獨附上 exe，供程式內「立即更新」只下載主程式（不含 ffmpeg，體積小）
          Copy-Item target/release/photo2video.exe photo2video.exe

      - name: 發佈到 GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: |
            photo2video-*.zip
            photo2video.exe
          generate_release_notes: true
